# =================================================================
# 06_publish_app.yml
# Bloom by BotaniK — Workflow de publication de l'App Bibliothèque
# =================================================================
#
# Déclencheurs :
# - push sur 03_BASE_DE_DONNEES/plants.json (mise à jour des données)
# - push sur 06_APP_BIBLIOTHEQUE/** (mise à jour du code app)
# - push sur 05_AUTOMATION/scripts/publish_app_bundle.py (mise à jour du script)
# - workflow_dispatch (déclenchement manuel)
#
# Ce workflow :
# 1. Valide l'existence de plants.json
# 2. Exécute publish_app_bundle.py :
#    - Valide et enrichit les données
#    - Génère version-manifest.json (double écriture DB + data)
#    - Rend index.template.html -> index.html avec manifest injecté
#    - Génère app-version.js
#    - Écrit le log dans 07_LOGS/app_publish_log.md
# 3. Commit tous les artefacts générés
# 4. Écrit un résumé dans GITHUB_STEP_SUMMARY
#
# =================================================================
name: 06_publish_app

on:
  push:
    paths:
      - '03_BASE_DE_DONNEES/plants.json'
      - '06_APP_BIBLIOTHEQUE/**'
      - '05_AUTOMATION/scripts/publish_app_bundle.py'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Forcer le rebuild même sans changement'
        required: false
        default: 'false'

permissions:
  contents: write

env:
  PLANTS_JSON: 03_BASE_DE_DONNEES/plants.json
  APP_DATA_DIR: 06_APP_BIBLIOTHEQUE/data
  APP_PUBLIC_DIR: 06_APP_BIBLIOTHEQUE/public
  SCRIPTS_DIR: 05_AUTOMATION/scripts
  LOG_PATH: 07_LOGS/app_publish_log.md

jobs:
  publish_app:
    name: Publier le bundle App Bibliothèque
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Vérifier l'existence de plants.json
        id: check_data
        run: |
          if [ ! -f "$PLANTS_JSON" ]; then
            echo "status=missing" >> $GITHUB_OUTPUT
            echo "::warning::plants.json introuvable dans $PLANTS_JSON"
            exit 1
          else
            COUNT=$(python3 -c "import json,sys; d=json.load(open('$PLANTS_JSON')); print(len(d) if isinstance(d,list) else len(d.get('plants',[])))" 2>/dev/null || echo 0)
            echo "status=ok" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            echo "::notice::plants.json trouvé — $COUNT plantes"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Créer les dossiers nécessaires
        run: |
          mkdir -p $APP_DATA_DIR
          mkdir -p 07_LOGS

      - name: Exécuter publish_app_bundle.py
        id: publish
        run: |
          python3 $SCRIPTS_DIR/publish_app_bundle.py
          echo "published=true" >> $GITHUB_OUTPUT

      - name: Commit de tous les artefacts générés
        if: steps.publish.outputs.published == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stager tous les fichiers générés
          git add $APP_DATA_DIR/
          git add $APP_PUBLIC_DIR/index.html
          git add 03_BASE_DE_DONNEES/version-manifest.json
          git add 07_LOGS/
          if git diff --staged --quiet; then
            echo "Aucun changement à committer."
          else
            VERSION=$(python3 -c "import json; m=json.load(open('03_BASE_DE_DONNEES/version-manifest.json')); print(m.get('app_version','?'))")
            BUILD=$(python3 -c "import json; m=json.load(open('03_BASE_DE_DONNEES/version-manifest.json')); print(m.get('build_id','?'))")
            git commit -m "chore: publish app bundle v${VERSION} / build ${BUILD}"
            git push
          fi

      - name: Résumé du workflow
        if: always()
        run: |
          VERSION=$(python3 -c "import json; m=json.load(open('03_BASE_DE_DONNEES/version-manifest.json')); print(m.get('app_version','?'))" 2>/dev/null || echo '?')
          PLANTS_VER=$(python3 -c "import json; m=json.load(open('03_BASE_DE_DONNEES/version-manifest.json')); print(m.get('plants_version','?'))" 2>/dev/null || echo '?')
          BUILD=$(python3 -c "import json; m=json.load(open('03_BASE_DE_DONNEES/version-manifest.json')); print(m.get('build_id','?'))" 2>/dev/null || echo '?')
          echo "## App Bibliothèque — Rapport de publication" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Champ | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.publish.outputs.published == 'true' && '✅ OK' || '⚠️ Warning' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| App Version | ${VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| Plants Version | ${PLANTS_VER} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build ID | ${BUILD} |" >> $GITHUB_STEP_SUMMARY
          echo "| Plantes dans plants.json | ${{ steps.check_data.outputs.count || '?' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Date | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Branche | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Déclenché par | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
